spring:
  datasource:
    url: jdbc:h2:mem:message_service_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
