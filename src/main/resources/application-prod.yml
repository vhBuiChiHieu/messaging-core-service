app:
  env: prod
logging:
  level:
    root: WARN
spring:
  datasource:
    url: jdbc:mysql://mysql-prod:3306/message_service?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC&serverTimezone=UTC
    username: messaging
    password: messaging
    hikari:
      maximum-pool-size: 24
      minimum-idle: 6
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
